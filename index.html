<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Vault - Ayush</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#0b1120}
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1)}
.card:hover{transform:translateY(-8px);transition:.3s}
</style>
</head>
<body class="text-white">

<header class="py-16 text-center">
<h1 class="text-6xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-transparent bg-clip-text">
Certificate Vault
</h1>
<p class="text-gray-400 mt-4">Professional Certifications & Achievements</p>
</header>

<div class="max-w-7xl mx-auto px-6">

<div class="grid md:grid-cols-4 gap-4 mb-10">
<div class="glass rounded-2xl p-5 text-center"><h2 class="text-3xl font-bold">9+</h2><p>Certificates</p></div>
<div class="glass rounded-2xl p-5 text-center"><h2 class="text-3xl font-bold">DSA</h2><p></p></div>
<div class="glass rounded-2xl p-5 text-center"><h2 class="text-3xl font-bold">Development</h2><p></p></div>
<div class="glass rounded-2xl p-5 text-center"><h2 class="text-3xl font-bold">Cloud</h2><p></p></div>
</div>

<input id="search" placeholder="Search certificates..." class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 mb-8">

<div class="flex gap-3 flex-wrap mb-8">
<button class="filter px-4 py-2 glass rounded-xl" data-filter="all">All</button>
<button class="filter px-4 py-2 glass rounded-xl" data-filter="AWS">AWS</button>
<button class="filter px-4 py-2 glass rounded-xl" data-filter="DevOps">DevOps</button>
<button class="filter px-4 py-2 glass rounded-xl" data-filter="Cybersecurity">Cybersecurity</button>
<button class="filter px-4 py-2 glass rounded-xl" data-filter="DSA">DSA</button>
</div>

<div id="gallery" class="grid md:grid-cols-3 gap-6"></div>

<h2 class="text-4xl font-bold mt-20 mb-8">Learning Timeline</h2>
<div class="space-y-4 mb-20">
<div class="glass p-5 rounded-xl">2025 - DevOps, Azure + AWS DevOps, Non-Linear Data Structures</div>
<div class="glass p-5 rounded-xl">2024 - Ethical Hacking, AI on AWS, Algorithms</div>
<div class="glass p-5 rounded-xl">2022 - JPMorgan Cybersecurity, PHP Internship</div>
</div>

</div>

<div id="modal" class="hidden fixed inset-0 bg-black/90 items-center justify-center p-4">
<div class="max-w-5xl w-full">
<img id="modalImg" class="w-full rounded-xl">
<button onclick="closeModal()" class="mt-4 px-6 py-3 bg-blue-600 rounded-xl">Close</button>
</div>
</div>

<script>
const certs = [
{
name:"Azure + AWS DevOps",
cat:"DevOps",
img:"certificates/azure-aws-devops.jpg"
},
{
name:"Ethical Hacking and Penetration Testing",
cat:"Cybersecurity",
img:"certificates/ethical-hacking.jpg"
},
{
name:"Mastering AI on AWS",
cat:"AWS",
img:"certificates/aws-ai.jpg"
},
{
name:"Mastering Algorithms",
cat:"DSA",
img:"certificates/algorithms.jpg"
},
{
name:"PHP-MySQL Internship",
cat:"Internship",
img:"certificates/php-internship.jpg"
},
{
name:"JPMorgan Cybersecurity Virtual Experience",
cat:"Cybersecurity",
img:"certificates/jpmorgan.png"
},
{
name:"AWS Certifications",
cat:"AWS",
img:"certificates/aws-certifications.jpg"
}
];

const gallery=document.getElementById("gallery");

function render(data){
gallery.innerHTML="";
data.forEach(c=>{
gallery.innerHTML+=`
<div class="card glass rounded-2xl overflow-hidden">
<img src="${c.img}" class="h-64 w-full object-cover">
<div class="p-5">
<span class="text-cyan-400">${c.cat}</span>
<h3 class="text-xl font-bold mt-2">${c.name}</h3>
<div class="flex gap-3 mt-4">
<button onclick="openModal('${c.img}')" class="bg-blue-600 px-4 py-2 rounded-lg">View</button>
<a href="${c.img}" download class="bg-green-600 px-4 py-2 rounded-lg">Download</a>
</div>
</div>
</div>`;
});
}

render(certs);

document.getElementById("search").addEventListener("input",e=>{
const v=e.target.value.toLowerCase();
render(certs.filter(x=>x.name.toLowerCase().includes(v)));
});

document.querySelectorAll(".filter").forEach(btn=>{
btn.onclick=()=>{
const f=btn.dataset.filter;
if(f==="all") render(certs);
else render(certs.filter(x=>x.cat===f));
}
});

function openModal(img){
document.getElementById("modal").classList.remove("hidden");
document.getElementById("modal").classList.add("flex");
document.getElementById("modalImg").src=img;
}
function closeModal(){
document.getElementById("modal").classList.add("hidden");
}
</script>

</body>
</html>
